name: Publish

on:
  push:
    branches: [production]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

      - name: Check version bump
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view cpf-sg version 2>/dev/null || echo "0.0.0")
          echo "Local: $LOCAL, Published: $PUBLISHED"
          if [ "$(npx semver "$LOCAL" "$PUBLISHED" | tail -1)" = "$PUBLISHED" ]; then
            echo "::error::package.json version ($LOCAL) must be greater than published version ($PUBLISHED)"
            exit 1
          fi

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
